name: Download YouTube APK

on:
  # Chạy thủ công từ GitHub UI
  workflow_dispatch:
    inputs:
      version:
        description: 'YouTube APK version'
        required: false
        default: '20.21.37'
        type: string
  
  # Tự động chạy mỗi ngày lúc 00:00 (tùy chọn)
  schedule:
    - cron: '0 0 * * *'
  
  # Hoặc chạy khi push lên main branch
  # push:
  #   branches: [ main ]

jobs:
  download-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci
        npx playwright install chromium
        npx playwright install-deps
    
    - name: Create download directory
      run: mkdir -p downloads
    
    - name: Download YouTube APK
      run: node download-youtube.js
      env:
        TARGET_VERSION: ${{ inputs.version || '20.21.37' }}
    
    - name: List downloaded files
      run: ls -la downloads/ || ls -la *.apk 2>/dev/null || echo "No APK files found"
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: youtube-apk-${{ github.run_id }}
        path: |
          *.apk
          downloads/*.apk
        retention-days: 30
        compression-level: 0
    
    - name: Check if APK exists
      id: check_apk
      run: |
        if ls *.apk 1> /dev/null 2>&1 || ls downloads/*.apk 1> /dev/null 2>&1; then
          echo "apk_exists=true" >> $GITHUB_OUTPUT
          echo "APK file found successfully"
        else
          echo "apk_exists=false" >> $GITHUB_OUTPUT
          echo "No APK file found"
          exit 1
        fi
    
    - name: Upload to release (optional)
      if: success() && github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: youtube-apk-${{ github.run_number }}
        name: YouTube APK v${{ inputs.version || '20.21.37' }}
        body: |
          YouTube APK version ${{ inputs.version || '20.21.37' }}
          Downloaded on ${{ github.event.repository.updated_at }}
        files: |
          *.apk
          downloads/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
